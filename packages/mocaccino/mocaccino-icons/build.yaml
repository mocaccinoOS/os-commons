image: "quay.io/mocaccino/extra"

package_dir: /mocaccino-icons

steps:
# 1. Create the destination directory structure
- install -d /mocaccino-icons/usr/share/icons/mOS-icons/scalable/apps/

# 2. Copy the assets
- cp files/mOS_logo.png /mocaccino-icons/usr/share/icons/mOS-icons/
- cp files/mOS_outlined_hl.png /mocaccino-icons/usr/share/icons/mOS-icons/
- cp files/mOS_outlined_w.png /mocaccino-icons/usr/share/icons/mOS-icons/
- cp files/mOS_coffee_bean.png /mocaccino-icons/usr/share/icons/mOS-icons/

# 3. Setup the Symbolic Distributor Logo
# Rename to -symbolic.svg so KDE automatically handles light/dark theme color inversion
- cp files/mOS_outlined_hl.svg /mocaccino-icons/usr/share/icons/mOS-icons/scalable/apps/distributor-logo-symbolic.svg

# 4. Create the symlink for the distributor logo
- install -d /mocaccino-icons/usr/share/icons/hicolor/scalable/apps/
- ln -sf /mocaccino-icons/usr/share/icons/mOS-icons/scalable/apps/distributor-logo-symbolic.svg /mocaccino-icons/usr/share/icons/hicolor/scalable/apps/distributor-logo-symbolic.svg
