image: "alpine"

steps:
# 1. Copy the assets with explicit permissions
- install -Dm644 files/mOS_logo.png         /usr/share/icons/mOS-icons/mOS_logo.png
- install -Dm644 files/mOS_outlined_hl.png  /usr/share/icons/mOS-icons/mOS_outlined_hl.png
- install -Dm644 files/mOS_outlined_w.png   /usr/share/icons/mOS-icons/mOS_outlined_w.png
- install -Dm644 files/mOS_coffee_bean.png  /usr/share/icons/mOS-icons/mOS_coffee_bean.png
- install -Dm644 files/mOS_outlined_hl.svg  /usr/share/icons/mOS-icons/scalable/apps/distributor-logo-symbolic.svg
- install -Dm644 files/mOS_outlined_hl.svg  /usr/share/icons/mOS-icons/scalable/apps/start-here-symbolic.svg
- install -Dm644 files/mOS_outlined_hl.svg  /usr/share/icons/mOS-icons/scalable/apps/mocaccino.svg

# 2. Ensure directories exist
- install -d /usr/share/icons/hicolor/scalable/apps/
- install -d /usr/share/pixmaps/

# 3. Create the symlinks
# Distributor logo used by qdistroinfo / the KDE About This System dialog
- ln -sf /usr/share/icons/mOS-icons/scalable/apps/distributor-logo-symbolic.svg /usr/share/icons/hicolor/scalable/apps/distributor-logo-symbolic.svg
# Start here logo used by KDE Plasma's application launcher (menu) button
- ln -sf /usr/share/icons/mOS-icons/scalable/apps/start-here-symbolic.svg /usr/share/icons/hicolor/scalable/apps/start-here-symbolic.svg

# Legacy branding symlinks
- ln -sf /usr/share/icons/mOS-icons/mOS_outlined_hl.png /usr/share/pixmaps/mocaccino.png
- ln -sf /usr/share/icons/mOS-icons/scalable/apps/mocaccino.svg /usr/share/icons/hicolor/scalable/apps/mocaccino.svg