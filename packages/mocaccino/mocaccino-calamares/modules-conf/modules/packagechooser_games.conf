#
# MocaccinoOS additional software selection - Games
---
mode: optionalmultiple
method: legacy

labels:
    step: "Games"
    step[nl]: "Spellen"

items:
    - id: steam
      name: "Steam"
      description: "Valve's gaming platform."
      packages: [ apps/steam ]
      screenshot: ":/images/no-selection.png"
    - id: nvidia-drivers
      name: "NVIDIA Drivers"
      description: "Proprietary NVIDIA GPU drivers (LTS). Recommended for gaming on NVIDIA hardware."
      packages: [ kernel-modules/nvidia-drivers-lts ]
      screenshot: ":/images/no-selection.png"
    - id: lutris
      name: "Lutris"
      description: "Open gaming platform for Linux. (Community repository)"
      packages: [ apps/lutris ]
      screenshot: ":/images/no-selection.png"
    - id: wine-staging
      name: "Wine Staging"
      description: "Compatibility layer for running Windows applications. (Community repository)"
      packages: [ apps/wine-staging ]
      screenshot: ":/images/no-selection.png"
