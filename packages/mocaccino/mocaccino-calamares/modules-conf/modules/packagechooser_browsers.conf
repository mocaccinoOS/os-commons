# MocaccinoOS additional software selection - Browsers
---
mode: optionalmultiple
method: legacy

labels:
    step: "Browsers"
    step[nl]: "Browsers"

items:
    - id: chromium
      name: "Chromium"
      description: "Open-source web browser from Google."
      packages: [ apps/chromium ]
      screenshot: ":/images/no-selection.png"
    - id: brave
      name: "Brave"
      description: "Privacy-focused browser with built-in ad blocking."
      packages: [ apps/brave ]
      screenshot: ":/images/no-selection.png"
    - id: vivaldi
      name: "Vivaldi"
      description: "Feature-rich browser for power users."
      packages: [ apps/vivaldi ]
      screenshot: ":/images/no-selection.png"
    - id: opera
      name: "Opera"
      description: "Browser with built-in VPN and ad blocker."
      packages: [ apps/opera ]
      screenshot: ":/images/no-selection.png"
    - id: torbrowser
      name: "Tor Browser"
      description: "Browser for anonymous web browsing via the Tor network."
      packages: [ apps/torbrowser ]
      screenshot: ":/images/no-selection.png"
    - id: google-chrome
      name: "Google Chrome"
      description: "Google's web browser."
      packages: [ apps/google-chrome ]
      screenshot: ":/images/no-selection.png"
    - id: konqueror
      name: "Konqueror"
      description: "KDE web browser and file manager."
      packages: [ apps/konqueror ]
      screenshot: ":/images/no-selection.png"
