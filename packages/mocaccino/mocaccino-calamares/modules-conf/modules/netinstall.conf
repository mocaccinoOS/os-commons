# SPDX-License-Identifier: CC0-1.0
#
# MocaccinoOS optional software selection
# Presented as a multi-select checklist during the Calamares wizard.
# Selected package IDs are read by the mocaccino post-install module
# (main.py) which calls luet install for each selection.
#
# Packages marked with (Community) require the mocaccino-community-stable
# repository which is enabled automatically by main.py if needed.
---
label:
    sidebar: "Software"
    title: "Select Additional Software"

# Use inline group definitions
groupsUrl: local

groups:
    - name: "Browsers"
      description: "Additional web browsers (Firefox is installed by default)"
      hidden: false
      selected: false
      critical: false
      packages:
          - packageName: apps/chromium
            name: "Chromium"
            description: "Open-source web browser from Google"
          - packageName: apps/brave
            name: "Brave (Community)"
            description: "Privacy-focused browser with built-in ad blocking"
          - packageName: apps/vivaldi
            name: "Vivaldi (Community)"
            description: "Feature-rich browser for power users"
          - packageName: apps/opera
            name: "Opera (Community)"
            description: "Browser with built-in VPN and ad blocker"
          - packageName: apps/torbrowser
            name: "Tor Browser (Community)"
            description: "Anonymous web browsing via the Tor network"
          - packageName: apps/google-chrome
            name: "Google Chrome (Community)"
            description: "Google's web browser"
          - packageName: apps/konqueror
            name: "Konqueror (Community)"
            description: "KDE web browser and file manager"

    - name: "Office"
      description: "Office suites and productivity applications"
      hidden: false
      selected: false
      critical: false
      packages:
          - packageName: apps/evolution
            name: "Evolution"
            description: "Email, calendar and contacts manager"
          - packageName: apps/freeoffice
            name: "FreeOffice (Community)"
            description: "Compatible alternative to Microsoft Office"
          - packageName: apps/libreoffice
            name: "LibreOffice (Community)"
            description: "Full-featured free and open-source office suite"
          - packageName: apps/calligra
            name: "Calligra (Community)"
            description: "KDE office suite and graphics tools"

    - name: "Games"
      description: "Gaming platforms and compatibility tools"
      hidden: false
      selected: false
      critical: false
      packages:
          - packageName: apps/steam
            name: "Steam"
            description: "Valve's gaming platform"
          - packageName: kernel-modules/nvidia-drivers-lts
            name: "NVIDIA Drivers"
            description: "Proprietary NVIDIA GPU drivers (LTS). Recommended for gaming on NVIDIA hardware"
          - packageName: apps/lutris
            name: "Lutris (Community)"
            description: "Open gaming platform for Linux"
          - packageName: apps/wine-staging
            name: "Wine Staging (Community)"
            description: "Compatibility layer for running Windows applications"

    - name: "Development"
      description: "Compilers, build tools and IDEs"
      hidden: false
      selected: false
      critical: false
      packages:
          - packageName: devel/gcc
            name: "GCC"
            description: "GNU Compiler Collection — C, C++ and other language compilers"
          - packageName: devel/cmake
            name: "CMake"
            description: "Cross-platform build system generator"
          - packageName: apps/kdevelop
            name: "KDevelop (Community)"
            description: "Full-featured IDE for C, C++, Python and more"
          - packageName: apps/vscodium
            name: "VSCodium (Community)"
            description: "Community-built, telemetry-free version of VS Code"
          - packageName: apps/bluefish
            name: "Bluefish (Community)"
            description: "Lightweight editor for web developers"
