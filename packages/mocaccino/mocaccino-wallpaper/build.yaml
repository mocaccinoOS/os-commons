image: "quay.io/mocaccino/extra"

package_dir: /mocaccino-wallpaper

steps:
- mkdir /mocaccino-wallpaper/usr/share/wallpapers/mocaccino-wallpaper -p
- cp background.jpg /mocaccino-wallpaper/usr/share/wallpapers/mocaccino-wallpaper
# Create symlink for XFCE
- mkdir -p /usr/share/backgrounds/xfce/
- ln -sf /usr/share/wallpapers/mocaccino-wallpaper/background.jpg /usr/share/backgrounds/xfce/xfce-x.svg
